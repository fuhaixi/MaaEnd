<div class="maptracker-internal-message-navigation-moving" style="background:#ffffff; color:#222222; padding:12px; border-radius:8px; border:1px solid #e6f9ff; max-width:560px;">
  <style>
    div:has(.maptracker-internal-message-navigation-moving):has(~ div .maptracker-internal-message-navigation-moving) {
      display: none !important;
    }
    div:has(.maptracker-internal-message-navigation-moving):has(~ div .maptracker-internal-message-navigation-finished) {
      display: none !important;
    }
  </style>
  <div style="font-size:1.0em; font-weight:700; color:#2b62c0;">{{t "waypoint"}} ({{.CurrentIdx}}/{{.Total}})</div>
  <div style="font-size:0.88em; margin-top:6px; color:#333333;">{{t "current"}}{{printf "%.1f" .CurX}}, {{printf "%.1f" .CurY}}</div>
  <div style="font-size:0.88em; color:#333333;">{{t "target"}}{{printf "%.1f" .TgtX}}, {{printf "%.1f" .TgtY}}</div>
  <img src="{{.PreviewURL}}" alt="preview" style="display:block; width:128px; height:128px; margin-top:8px; border-radius:6px; background:#f7fbff;" />
</div>
