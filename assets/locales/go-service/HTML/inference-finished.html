<div style="background: #ffffff; color: #222222; padding: 12px; border-radius: 8px; border: 1px solid #e6f9ff; max-width:520px;">
  <div style="font-size:1.0em; font-weight:700; color:#2b62c0;">{{t "loc"}}{{printf "%.1f" .X}}, {{printf "%.1f" .Y}}</div>
  <div style="font-size:0.9em; margin-top:8px; color:#555555;">{{t "rot"}}{{.Rot}}°</div>
  <div style="font-size:0.9em; color:#555555;">{{t "map"}}{{.MapName}}</div>
</div>
