<div class="maptracker-internal-message-navigation-finished" style="background: #ffffff; color: #222222; padding: 12px; border-radius: 8px; border: 1px solid #e6f4ea; max-width:520px;">
  <div style="font-size:1.0em; font-weight:700; color:#27ae60;">{{t "complete"}} ({{.CurrentIdx}}/{{.Total}})</div>
  <div style="font-size:0.9em; margin-top:8px; color:#333333;">{{t "current"}}{{printf "%.1f" .CurX}}, {{printf "%.1f" .CurY}}</div>
  <img src="{{.PreviewURL}}" alt="preview" style="display:block; width:128px; height:128px; margin-top:8px; border-radius:6px; background:#f7fbff;" />
</div>
